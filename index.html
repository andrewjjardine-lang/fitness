<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080F18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Training Log" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Training Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080F18;
      --surface:   #111D2B;
      --surface2:  #0A1220;
      --border:    #1E2E40;
      --text:      #F0F4FF;
      --muted:     #8AAABF;
      --dim:       #4A6A80;
      --faint:     #1A2A3A;
      --bench:     #E8A838;
      --vo2:       #4ABEAA;
      --zone2:     #7B8FE8;
      --mono:      'Courier New', monospace;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, Arial, sans-serif;
      min-height: 100vh;
      padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bot) + 32px);
      max-width: 640px;
      margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .header { margin-bottom: 24px; }
    .header-eyebrow {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px;
    }
    .header-row {
      display: flex; align-items: baseline; justify-content: space-between;
      border-bottom: 1px solid var(--faint); padding-bottom: 12px;
    }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header-count { font-family: var(--mono); font-size: 12px; color: var(--dim); }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      background: var(--surface2); border-radius: 8px; padding: 4px;
    }
    .tab {
      flex: 1; padding: 8px 4px; border: none; border-radius: 6px;
      background: transparent; color: var(--dim); font-size: 12px;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      white-space: nowrap; text-align: center;
    }
    .tab.active { background: var(--surface); color: var(--text); font-weight: 600; }

    /* ── CARD ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 16px; margin-bottom: 14px;
      border-top-width: 3px;
    }
    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .card-value-row { display: flex; align-items: baseline; gap: 6px; }
    .card-value { font-family: var(--mono); font-size: 34px; font-weight: 700; }
    .card-value.empty { color: #2A3A4A; }
    .card-unit { font-family: var(--mono); font-size: 13px; color: var(--dim); }
    .card-delta { font-family: var(--mono); font-size: 13px; }
    .card-delta.pos { color: var(--vo2); }
    .card-delta.neg { color: #E87A5A; }
    .card-desc { font-size: 11px; color: var(--dim); margin-top: 2px; }

    /* ── ARC ── */
    .arc-wrap { flex-shrink: 0; }

    /* ── INPUT ROW ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .input-num {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 9px 10px; font-family: var(--mono); font-size: 15px;
      width: 90px; outline: none; -webkit-appearance: none;
    }
    .input-note {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 9px 10px; font-family: inherit; font-size: 13px;
      flex: 1; outline: none;
    }
    .input-num::placeholder, .input-note::placeholder { color: #2A3A4A; }
    .btn-log {
      border: none; border-radius: 6px; padding: 9px 14px; font-weight: 700;
      font-size: 13px; cursor: pointer; font-family: inherit; color: #080F18;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── HISTORY ── */
    .history-toggle {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 11px; padding: 2px 0; letter-spacing: 1px; text-transform: uppercase;
      font-family: inherit;
    }
    .history-list { margin-top: 10px; }
    .history-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--surface2); border-radius: 4px; margin-bottom: 3px;
    }
    .entry-date { font-family: var(--mono); font-size: 12px; color: var(--dim); min-width: 88px; }
    .entry-val { font-family: var(--mono); font-size: 13px; font-weight: 700; min-width: 60px; text-align: right; }
    .entry-unit { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .entry-note { font-size: 11px; color: #6A8A9A; flex: 1; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .entry-del {
      background: none; border: none; color: #2A3A4A; cursor: pointer;
      font-size: 16px; padding: 0 2px; line-height: 1; margin-left: auto; flex-shrink: 0;
    }

    /* ── TREND PANEL ── */
    .trend-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 16px; margin-bottom: 14px;
    }
    .trend-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .trend-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .trend-tab {
      padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--dim); font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .trend-tab.active { font-weight: 700; }
    .trend-empty { color: #2A3A4A; font-size: 12px; text-align: center; padding: 18px 0; font-family: var(--mono); }
    svg.trend { display: block; width: 100%; }

    /* ── FOOTER ── */
    .footer { color: #1A2A3A; font-size: 11px; text-align: center; margin-top: 16px; font-family: var(--mono); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Andrew Jardine · Training Log</div>
  <div class="header-row">
    <div class="header-title">Three Benchmarks</div>
    <div class="header-count" id="total-count">0 entries</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showView('log')" id="tab-log">Log</button>
  <button class="tab" onclick="showView('trend')" id="tab-trend">Trend</button>
</div>

<div id="view-log">
  <div id="cards"></div>
</div>

<div id="view-trend" style="display:none">
  <div class="trend-panel">
    <div class="trend-label">Progress Trend</div>
    <div class="trend-tabs" id="trend-tabs"></div>
    <svg class="trend" id="trend-svg" viewBox="0 0 320 90" height="90"></svg>
    <div class="trend-empty" id="trend-empty" style="display:none">Log at least 2 entries to see trend</div>
  </div>
</div>

<div class="footer">Log weekly · trend matters more than any single reading</div>

<script>
const BENCHMARKS = {
  bench: { label: "Bench Press",      unit: "lb",          target: 220, color: "#E8A838", desc: "1RM target: bodyweight (220 lb)" },
  vo2:   { label: "VO2 Max",          unit: "ml/kg/min",   target: 44,  color: "#4ABEAA", desc: "Target: 75th percentile age 43" },
  zone2: { label: "Zone 2 Endurance", unit: "min",         target: 45,  color: "#7B8FE8", desc: "Target: 45 min continuous @ 60–70% HR" },
};

const STORAGE_KEY = "aj_fitness_v1";

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {bench:[],vo2:[],zone2:[]}; }
  catch { return {bench:[],vo2:[],zone2:[]}; }
}
function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

let state = load();
let activeTrend = "bench";
let expandedCards = {};

function today() {
  return new Date().toISOString().split("T")[0];
}

function totalEntries() {
  return Object.values(state).reduce((a, arr) => a + arr.length, 0);
}

// ── ARC SVG ──────────────────────────────────────────────────────────────────
function arcPath(cx, cy, r, startDeg, endDeg) {
  const toRad = d => d * Math.PI / 180;
  const x1 = cx + r * Math.cos(toRad(startDeg));
  const y1 = cy + r * Math.sin(toRad(startDeg));
  const x2 = cx + r * Math.cos(toRad(endDeg));
  const y2 = cy + r * Math.sin(toRad(endDeg));
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function buildArc(value, target, color, size=100) {
  const pct = Math.min(value / target, 1);
  const cx = size/2, cy = size/2, r = size/2 - 9;
  const start = -210, sweep = 240;
  const fillEnd = start + sweep * pct;
  const trackPath = arcPath(cx, cy, r, start, start + sweep);
  const fillPath = pct > 0 ? arcPath(cx, cy, r, start, Math.max(fillEnd, start + 0.5)) : "";
  const pctText = Math.round(pct * 100);
  const textColor = pct >= 1 ? color : "#F0F4FF";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <path d="${trackPath}" fill="none" stroke="#1E2A3A" stroke-width="7" stroke-linecap="round"/>
    ${fillPath ? `<path d="${fillPath}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>` : ""}
    <text x="${cx}" y="${cy+6}" text-anchor="middle" fill="${textColor}" font-size="16" font-family="'Courier New',monospace" font-weight="700">${pctText}%</text>
  </svg>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  save(state);
  document.getElementById("total-count").textContent =
    totalEntries() + (totalEntries() === 1 ? " entry" : " entries");

  const container = document.getElementById("cards");
  container.innerHTML = "";

  Object.entries(BENCHMARKS).forEach(([id, bm]) => {
    const entries = state[id] || [];
    const sorted  = [...entries].sort((a,b) => new Date(b.date) - new Date(a.date));
    const latest  = sorted[0];
    const prev    = sorted[1];
    const current = latest ? latest.value : 0;
    const delta   = (latest && prev) ? (current - prev.value) : null;
    const expanded = expandedCards[id];

    let deltaHTML = "";
    if (delta !== null) {
      const cls   = delta > 0 ? "pos" : delta < 0 ? "neg" : "";
      const sign  = delta > 0 ? "+" : "";
      const disp  = delta % 1 === 0 ? delta : delta.toFixed(1);
      deltaHTML = `<span class="card-delta ${cls}">${sign}${disp}</span>`;
    }

    const histHTML = sorted.map(e => `
      <div class="history-entry">
        <span class="entry-date">${e.date}</span>
        <span class="entry-val" style="color:${bm.color}">${e.value}</span>
        <span class="entry-unit">${bm.unit}</span>
        ${e.note ? `<span class="entry-note">${e.note}</span>` : '<span class="entry-note"></span>'}
        <button class="entry-del" onclick="deleteEntry('${id}','${e.id}')">×</button>
      </div>`).join("");

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderTopColor = bm.color;
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-label">${bm.label}</div>
          <div class="card-value-row">
            <span class="card-value ${current===0?'empty':''}">${current > 0 ? current : "—"}</span>
            <span class="card-unit">${bm.unit}</span>
            ${deltaHTML}
          </div>
          <div class="card-desc">${bm.desc}</div>
        </div>
        <div class="arc-wrap">${buildArc(current, bm.target, bm.color, 96)}</div>
      </div>
      <div class="input-row">
        <input class="input-num" id="inp-${id}" type="number" inputmode="decimal" placeholder="${bm.unit}" />
        <input class="input-note" id="note-${id}" type="text" placeholder="Note (optional)" />
        <button class="btn-log" style="background:${bm.color}" onclick="logEntry('${id}')">Log</button>
      </div>
      ${sorted.length > 0 ? `
        <button class="history-toggle" onclick="toggleHistory('${id}')">
          ${expanded ? "▲ Hide" : `▼ History (${sorted.length})`}
        </button>
        ${expanded ? `<div class="history-list">${histHTML}</div>` : ""}
      ` : ""}
    `;
    container.appendChild(card);

    // Enter key support
    ["inp-"+id, "note-"+id].forEach(iid => {
      const el = document.getElementById(iid);
      if (el) el.addEventListener("keydown", e => { if (e.key === "Enter") logEntry(id); });
    });
  });

  renderTrend();
}

function logEntry(id) {
  const valEl  = document.getElementById("inp-"+id);
  const noteEl = document.getElementById("note-"+id);
  const val    = parseFloat(valEl.value);
  if (isNaN(val) || val <= 0) return;
  state[id].push({ id: Date.now(), date: today(), value: val, unit: BENCHMARKS[id].unit, note: noteEl.value.trim() });
  render();
}

function deleteEntry(benchId, entryId) {
  state[benchId] = state[benchId].filter(e => String(e.id) !== String(entryId));
  render();
}

function toggleHistory(id) {
  expandedCards[id] = !expandedCards[id];
  render();
}

// ── TREND ─────────────────────────────────────────────────────────────────────
function renderTrend() {
  const tabsEl  = document.getElementById("trend-tabs");
  const svgEl   = document.getElementById("trend-svg");
  const emptyEl = document.getElementById("trend-empty");
  tabsEl.innerHTML = "";

  Object.entries(BENCHMARKS).forEach(([id, bm]) => {
    const btn = document.createElement("button");
    btn.className = "trend-tab" + (activeTrend === id ? " active" : "");
    btn.textContent = bm.label;
    btn.style.borderColor = activeTrend === id ? bm.color : "";
    btn.style.color       = activeTrend === id ? bm.color : "";
    btn.onclick = () => { activeTrend = id; renderTrend(); };
    tabsEl.appendChild(btn);
  });

  const bm      = BENCHMARKS[activeTrend];
  const entries = [...(state[activeTrend] || [])].sort((a,b) => new Date(a.date)-new Date(b.date));

  if (entries.length < 2) {
    svgEl.style.display   = "none";
    emptyEl.style.display = "block";
    return;
  }
  svgEl.style.display   = "block";
  emptyEl.style.display = "none";

  const W=320, H=90, pl=8, pr=8, pt=10, pb=16;
  const vals   = entries.map(e => e.value);
  const allV   = [...vals, bm.target];
  const maxV   = Math.max(...allV);
  const minV   = Math.min(...allV) * 0.92;
  const w = W-pl-pr, h = H-pt-pb;

  const xOf = i   => pl + (i/(entries.length-1))*w;
  const yOf = v   => pt + h - ((v-minV)/(maxV-minV))*h;
  const pts = entries.map((e,i) => `${xOf(i)},${yOf(e.value)}`).join(" ");
  const ty  = yOf(bm.target);

  svgEl.innerHTML = `
    <line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}"
      stroke="${bm.color}" stroke-width="1" stroke-dasharray="4 3" opacity="0.35"/>
    <polyline points="${pts}" fill="none" stroke="${bm.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${entries.map((e,i) => `<circle cx="${xOf(i)}" cy="${yOf(e.value)}" r="3.5" fill="${bm.color}"/>`).join("")}
    <text x="${W-pr-2}" y="${ty-4}" text-anchor="end" fill="${bm.color}" font-size="9"
      font-family="'Courier New',monospace" opacity="0.55">TARGET ${bm.target}${bm.unit}</text>
    ${entries.map((e,i) => i===0||i===entries.length-1 ? `
      <text x="${xOf(i)}" y="${H-2}" text-anchor="${i===0?'start':'end'}"
        fill="#3A5A6A" font-size="9" font-family="'Courier New',monospace">${e.date.slice(5)}</text>
    ` : "").join("")}
  `;
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────────
function showView(v) {
  document.getElementById("view-log").style.display   = v==="log"   ? "" : "none";
  document.getElementById("view-trend").style.display = v==="trend" ? "" : "none";
  document.getElementById("tab-log").classList.toggle("active",   v==="log");
  document.getElementById("tab-trend").classList.toggle("active", v==="trend");
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

render();
</script>
</body>
</html>
